name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BOOKING_MODE: ${{ vars.NEXT_PUBLIC_BOOKING_MODE }}
      NEXT_PUBLIC_BOOKING_API_BASE_URL: ${{ vars.NEXT_PUBLIC_BOOKING_API_BASE_URL }}
      NEXT_PUBLIC_SQUARE_BOOKING_URL: ${{ vars.NEXT_PUBLIC_SQUARE_BOOKING_URL }}
      NEXT_PUBLIC_ACUITY_SCHEDULER_URL: ${{ vars.NEXT_PUBLIC_ACUITY_SCHEDULER_URL }}
      NEXT_PUBLIC_CALCOM_LINK: ${{ vars.NEXT_PUBLIC_CALCOM_LINK }}
      LESSON_PRICE_CENTS: ${{ vars.LESSON_PRICE_CENTS || '2500' }}
      LESSON_CURRENCY: ${{ vars.LESSON_CURRENCY || 'eur' }}
      NEXT_PUBLIC_LESSON_DURATION_MINUTES: ${{ vars.NEXT_PUBLIC_LESSON_DURATION_MINUTES || '75' }}
      NEXT_PUBLIC_SAME_DAY_RESCHEDULE_FEE_CENTS: ${{ vars.NEXT_PUBLIC_SAME_DAY_RESCHEDULE_FEE_CENTS || '500' }}
      NEXT_PUBLIC_RESCHEDULE_FEE_MODE: ${{ vars.NEXT_PUBLIC_RESCHEDULE_FEE_MODE || 'manual' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check booking link
        run: npm run check:booking

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
