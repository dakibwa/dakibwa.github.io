<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canonical site direction — Português com a Inês</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fff8ef;
        --ink: #083229;
        --lavender: #a6a5da;
        --coral: #ff6b35;
        --rule: rgba(8, 50, 41, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      header {
        display: grid;
        gap: 1.5rem;
        padding: clamp(2rem, 5vw, 5rem);
        border-bottom: 1px solid var(--rule);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        max-width: 12ch;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.75rem, 7vw, 7rem);
        font-weight: 400;
        line-height: 0.92;
      }

      header p {
        max-width: 60ch;
        font-size: clamp(1rem, 1.5vw, 1.25rem);
        line-height: 1.5;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.5rem;
      }

      nav a {
        color: inherit;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-decoration-color: var(--coral);
        text-decoration-thickness: 2px;
        text-transform: uppercase;
        text-underline-offset: 0.35rem;
      }

      main {
        display: grid;
        gap: clamp(4rem, 9vw, 9rem);
        padding: clamp(2rem, 5vw, 5rem);
      }

      figure {
        display: grid;
        gap: 1.25rem;
        margin: 0;
        scroll-margin-top: 2rem;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--ink);
        box-shadow: 0.75rem 0.75rem 0 var(--lavender);
      }

      figure:nth-child(even) img {
        box-shadow: 0.75rem 0.75rem 0 var(--coral);
      }

      figcaption {
        display: grid;
        grid-template-columns: minmax(0, 12rem) minmax(0, 46rem);
        gap: 1rem 3rem;
        align-items: baseline;
      }

      h2 {
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      figcaption p {
        line-height: 1.55;
      }

      @media (max-width: 700px) {
        figcaption {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Canonical site direction</h1>
      <p>
        The approved visual target for Home, Approach, Lessons, FAQ and Booking.
      </p>
      <nav aria-label="Concept pages">
        <a href="#home">Home</a>
        <a href="#approach">Approach</a>
        <a href="#lessons">Lessons</a>
        <a href="#faq">FAQ</a>
        <a href="#booking">Booking</a>
      </nav>
    </header>
    <main>
      <figure id="home">
        <img src="01-home.png" alt="Homepage concept" />
        <figcaption>
          <h2>01 — Home</h2>
          <p>
            The selected direction: poster typography, business-card colour,
            and the radial conversation burst as the main signature.
          </p>
        </figcaption>
      </figure>
      <figure id="approach">
        <img src="02-approach.png" alt="Approach page concept" />
        <figcaption>
          <h2>02 — Approach</h2>
          <p>
            A teaching manifesto with three practical principles and a compact
            introduction to Inês.
          </p>
        </figcaption>
      </figure>
      <figure id="lessons">
        <img src="03-lessons.png" alt="Lessons page concept" />
        <figcaption>
          <h2>03 — Lessons</h2>
          <p>
            Current lesson formats presented as a clear printed programme
            instead of a row of conventional pricing cards.
          </p>
        </figcaption>
      </figure>
      <figure id="faq">
        <img src="04-faq.png" alt="FAQ page concept" />
        <figcaption>
          <h2>04 — FAQ</h2>
          <p>
            A reference-index treatment with topic navigation and a ruled,
            accessible accordion.
          </p>
        </figcaption>
      </figure>
      <figure id="booking">
        <img src="05-booking.png" alt="Booking page concept" />
        <figcaption>
          <h2>05 — Booking</h2>
          <p>
            An editorial appointment sheet that reserves availability and
            selection state for the live booking system.
          </p>
        </figcaption>
      </figure>
    </main>
  </body>
</html>
